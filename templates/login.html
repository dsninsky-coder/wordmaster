<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录 - 单词大师</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body class="auth-page">
<div class="auth-container">
    <div class="auth-card">
        <div class="auth-logo">📚</div>
        <h1 class="auth-title">单词大师</h1>
        <p class="auth-subtitle">登录你的账号，开始记忆之旅</p>

        {% if error %}
        <div class="alert alert-error">{{ error }}</div>
        {% endif %}

        <form method="post" class="auth-form">
            <div class="form-group">
                <label for="username">用户名</label>
                <input type="text" id="username" name="username" required placeholder="请输入用户名" autocomplete="username">
            </div>
            <div class="form-group">
                <label for="password">密码</label>
                <input type="password" id="password" name="password" required placeholder="请输入密码" autocomplete="current-password">
            </div>
            <button type="submit" class="btn btn-primary btn-full">登 录</button>
        </form>

        <div class="auth-footer">
            还没有账号？<a href="{{ url_for('register') }}">立即注册</a>
        </div>
        <div class="auth-hint">@皮皮爸爸为小皮皮们专门开发</div>
    </div>
</div>
</body>
</html>
